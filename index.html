<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ma Vie Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050507; color: #f1f5f9; }
        .glass { background: rgba(20, 20, 25, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        input { font-size: 16px !important; } /* Évite le zoom auto sur iPhone */
        .active-tab { color: #818cf8 !important; }
        .active-tab i { transform: translateY(-4px); transition: transform 0.3s; }
    </style>
</head>
<body x-data="app()" x-init="init()" class="overflow-x-hidden">

    <template x-if="!isLoggedIn">
        <div class="fixed inset-0 z-[100] flex items-center justify-center bg-[#050507] p-6">
            <div class="glass p-8 rounded-[2.5rem] w-full max-w-sm">
                <div class="w-20 h-20 bg-indigo-600 rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-2xl shadow-indigo-500/40">
                    <i data-lucide="shield-check" class="text-white w-10 h-10"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-center mb-10 tracking-tight">Ma Vie</h1>
                <div class="space-y-4">
                    <input type="email" x-model="loginData.email" placeholder="Email" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <input type="password" x-model="loginData.pass" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <button @click="handleLogin" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold text-lg active:scale-95 transition-transform">Continuer</button>
                </div>
            </div>
        </div>
    </template>

    <div class="min-h-screen pb-32" x-show="isLoggedIn">
        <header class="p-6 flex justify-between items-center sticky top-0 z-40 bg-[#050507]/80 backdrop-blur-md">
            <div>
                <h2 class="text-2xl font-extrabold tracking-tight" x-text="menu.find(m => m.id === tab).label"></h2>
                <div class="flex items-center gap-2 mt-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest" x-text="currentMonth"></span>
                </div>
            </div>
            <select x-model="currentMonth" class="bg-indigo-600 text-[12px] font-bold px-3 py-2 rounded-full border-none outline-none">
                <template x-for="m in months"><option :value="m" x-text="m" class="capitalize"></option></template>
            </select>
        </header>

        <main class="px-5 space-y-6">
            <div x-show="tab === 'portefeuille'" class="space-y-6">
                <div class="glass p-8 rounded-[2.5rem] border-indigo-500/20 shadow-2xl">
                    <p class="text-[10px] uppercase font-bold text-gray-500 tracking-widest mb-2">Salaire Mensuel</p>
                    <input type="number" x-model.number="db.salary" class="bg-transparent text-5xl font-black w-full outline-none">
                    
                    <div class="mt-10 space-y-3">
                        <div class="flex justify-between p-4 bg-white/5 rounded-2xl">
                            <span class="text-sm text-gray-400">Total Factures</span>
                            <span class="text-red-400 font-bold" x-text="'- ' + formatAr(getTotalExpenses(currentMonth))"></span>
                        </div>
                        <div class="flex justify-between p-5 bg-indigo-500/10 rounded-2xl border border-indigo-500/30">
                            <span class="font-bold">Reste Net</span>
                            <span class="text-indigo-400 font-black text-xl" x-text="formatAr(calcWallet(currentMonth))"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div x-show="tab === 'epargne'" class="space-y-3">
                <template x-for="m in months">
                    <div class="glass p-4 rounded-2xl flex items-center justify-between">
                        <span class="capitalize text-sm font-bold text-gray-400" x-text="m"></span>
                        <input type="number" x-model.number="db.epargne[m]" placeholder="0" class="bg-white/5 p-3 rounded-xl text-right w-36 outline-none focus:ring-1 focus:ring-indigo-500">
                    </div>
                </template>
            </div>

            <div x-show="tab === 'objectif'" class="space-y-6">
                <div class="bg-indigo-600/10 p-4 rounded-2xl border border-indigo-500/20">
                    <p class="text-xs text-center text-indigo-400">Objectifs pour <span class="capitalize font-bold" x-text="currentMonth"></span></p>
                </div>
                <div class="space-y-3">
                    <template x-for="i in 5">
                        <div class="flex items-center gap-3 glass p-4 rounded-2xl">
                            <span class="text-indigo-500 font-bold" x-text="i"></span>
                            <input type="text" x-model="db.targets[currentMonth][i-1]" placeholder="Définir un objectif..." class="bg-transparent w-full outline-none text-sm">
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="['jirama','ecolage','shopping','medical','adidy','loyer','lessive','frais','repas','autres'].includes(tab)" class="space-y-3">
                <template x-for="m in months">
                    <div class="glass p-4 rounded-2xl flex items-center justify-between">
                        <span class="capitalize text-sm font-bold text-gray-400" x-text="m"></span>
                        <div class="flex items-center gap-2">
                            <input type="number" x-model.number="db[tab][m]" placeholder="0" class="bg-white/5 p-3 rounded-xl text-right w-28 outline-none focus:ring-1 focus:ring-indigo-500">
                            <span class="text-[10px] font-bold text-gray-600" x-text="tab === 'jirama' ? 'kW' : 'Ar'"></span>
                        </div>
                    </div>
                </template>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 glass border-t border-white/10 px-2 py-3 flex justify-around items-center z-50 safe-area-bottom">
            <template x-for="item in menu.slice(0, 5)"> <button @click="tab = item.id" :class="tab === item.id ? 'active-tab' : 'text-gray-500'" class="flex flex-col items-center gap-1 flex-1">
                    <i :data-lucide="item.icon" class="w-6 h-6"></i>
                    <span class="text-[9px] font-bold uppercase" x-text="item.label === 'Portefeuille' ? 'Home' : item.label"></span>
                </button>
            </template>
            <button @click="showMore = !showMore" class="flex flex-col items-center gap-1 flex-1 text-gray-500">
                <i data-lucide="layers" class="w-6 h-6"></i>
                <span class="text-[9px] font-bold uppercase">Plus</span>
            </button>
        </nav>

        <div x-show="showMore" x-transition class="fixed inset-0 z-[60] glass p-10 grid grid-cols-2 gap-4 content-center">
            <template x-for="item in menu.slice(5)">
                <button @click="tab = item.id; showMore = false" class="p-6 bg-white/5 rounded-[2rem] flex flex-col items-center gap-3">
                    <i :data-lucide="item.icon" class="text-indigo-400"></i>
                    <span class="text-xs font-bold" x-text="item.label"></span>
                </button>
            </template>
            <button @click="showMore = false" class="col-span-2 mt-8 text-red-400 font-bold uppercase text-xs">Fermer</button>
        </div>
    </div>

    <script>
        // Configuration Firebase
        var firebaseConfig = {
            apiKey: "AIzaSyBY_zHJAaNLtXDBlD1TYMzALlMlMHNBwWk",
            authDomain: "aiza-38b31.firebaseapp.com",
            databaseURL: "https://aiza-38b31-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "aiza-38b31",
            storageBucket: "aiza-38b31.firebasestorage.app",
            messagingSenderId: "850157491678",
            appId: "1:850157491678:web:614b2b70b934cf09fcb94f",
            measurementId: "G-S6X470367V"
        };
        
        firebase.initializeApp(firebaseConfig);
        var fbRef = firebase.database().ref('ma_vie_v4');

        function app() {
            return {
                isLoggedIn: false, showMore: false,
                tab: 'portefeuille', currentMonth: 'avril',
                loginData: { email: '', pass: '' },
                months: ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'],
                expenseCategories: ['jirama', 'ecolage', 'shopping', 'medical', 'adidy', 'loyer', 'lessive', 'frais', 'repas', 'autres'],
                menu: [
                    { id: 'portefeuille', label: 'Portefeuille', icon: 'home' },
                    { id: 'jirama', label: 'Jirama', icon: 'zap' },
                    { id: 'ecolage', label: 'Écolage', icon: 'graduation-cap' },
                    { id: 'shopping', label: 'Shopping', icon: 'shopping-cart' },
                    { id: 'epargne', label: 'Épargne', icon: 'piggy-bank' },
                    { id: 'medical', label: 'Médical', icon: 'heart-pulse' },
                    { id: 'adidy', label: 'ADIDY', icon: 'gift' },
                    { id: 'loyer', label: 'Loyer', icon: 'door-open' },
                    { id: 'lessive', label: 'Lessive', icon: 'droplet' },
                    { id: 'frais', label: 'Frais', icon: 'file-text' },
                    { id: 'repas', label: 'Repas', icon: 'utensils' },
                    { id: 'objectif', label: 'Objectifs', icon: 'target' },
                    { id: 'autres', label: 'Autres', icon: 'more-horizontal' },
                ],
                db: {
                    salary: 0,
                    jirama: {}, ecolage: {}, shopping: {}, medical: {}, adidy: {},
                    loyer: {}, lessive: {}, frais: {}, repas: {}, autres: {},
                    epargne: {}, targets: {}
                },

                init() {
                    fbRef.on('value', (snapshot) => {
                        if (snapshot.exists()) {
                            let data = snapshot.val();
                            // Initialisation des nouveaux champs si vides
                            if (!data.epargne) data.epargne = {};
                            if (!data.targets) data.targets = {};
                            this.months.forEach(m => {
                                if (!data.targets[m]) data.targets[m] = ["","","","",""];
                            });
                            this.db = data;
                        }
                        this.refreshIcons();
                    });

                    this.$watch('db', val => { fbRef.set(val); }, { deep: true });
                    this.$watch('tab', () => this.refreshIcons());
                },

                refreshIcons() { setTimeout(() => lucide.createIcons(), 50); },

                handleLogin() {
                    if (this.loginData.email === 'lectratana@gmail.com' && this.loginData.pass === 'andy2050@@') {
                        this.isLoggedIn = true;
                        this.refreshIcons();
                    }
                },

                getMonthExpense(category, month) {
                    if (category === 'jirama') return (Number(this.db.jirama?.[month]) || 0) * 130;
                    return Number(this.db[category]?.[month]) || 0;
                },

                getTotalExpenses(month) {
                    return this.expenseCategories.reduce((total, cat) => total + this.getMonthExpense(cat, month), 0);
                },

                calcWallet(month) {
                    return (Number(this.db.salary) || 0) - this.getTotalExpenses(month);
                },

                formatAr(v) { return new Intl.NumberFormat('fr-FR').format(v || 0) + ' Ar'; }
            }
        }
    </script>
</body>
</html>
