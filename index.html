<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Vie - 3D Ultra Slim Sidebar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #08080a;
            color: #f1f5f9;
            overflow: hidden;
        }

        .glass {
            background: rgba(18, 18, 22, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .neo-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .sidebar-compact {
            width: 70px;
            transition: width 0.3s ease;
        }
        
        @media (min-width: 1024px) {
            .sidebar-compact { width: 240px; }
        }

        .nav-btn {
            transition: all 0.2s ease;
            color: #64748b;
        }

        .nav-btn.active {
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
            border-right: 3px solid #6366f1;
        }

        .glow-date {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.4);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.1);
        }

        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
        
        .alert-pulse {
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body x-data="app()" x-init="init()">

    <template x-if="!isLoggedIn">
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-[#08080a] p-6">
            <div class="glass p-8 rounded-[2rem] w-full max-w-sm border border-white/10 shadow-2xl">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                    <i data-lucide="shield-check" class="text-white w-8 h-8"></i>
                </div>
                <h1 class="text-2xl font-bold text-center mb-8">Ma Vie 3D</h1>
                <div class="space-y-4">
                    <input type="email" x-model="loginData.email" placeholder="lectratana@gmail.com" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-indigo-500">
                    <input type="password" x-model="loginData.pass" placeholder="••••••••" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl focus:outline-none focus:border-indigo-500">
                    <button @click="handleLogin" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold transition-all active:scale-95">Entrer</button>
                </div>
            </div>
        </div>
    </template>

    <div class="flex h-screen w-full overflow-hidden" x-show="isLoggedIn">
        
        <aside class="sidebar-compact glass h-full flex flex-col items-center lg:items-start py-8 border-r border-white/5">
            <div class="px-6 mb-12 flex items-center gap-3">
                <div class="min-w-[40px] h-10 bg-indigo-600 rounded-xl flex items-center justify-center">
                    <i data-lucide="heart" class="text-white w-5 h-5"></i>
                </div>
                <span class="hidden lg:block font-bold text-lg tracking-tight">MA VIE</span>
            </div>

            <nav class="w-full flex-1 space-y-1">
                <template x-for="item in menu">
                    <button @click="tab = item.id" 
                            :class="tab === item.id ? 'active' : ''"
                            class="nav-btn w-full flex items-center px-6 py-4 hover:text-white transition-colors group">
                        <i :data-lucide="item.icon" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                        <span class="hidden lg:block ml-4 text-sm font-medium" x-text="item.label"></span>
                    </button>
                </template>
            </nav>

            <button @click="isLoggedIn = false" class="px-6 py-4 text-gray-500 hover:text-red-400 transition-colors w-full flex items-center">
                <i data-lucide="log-out" class="w-5 h-5"></i>
                <span class="hidden lg:block ml-4 text-sm font-medium">Sortie</span>
            </button>
        </aside>

        <main class="flex-1 h-full overflow-y-auto bg-gradient-to-br from-black to-[#0c0c10] p-4 lg:p-10">
            
            <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-6 mb-12">
                <div>
                    <h2 class="text-3xl lg:text-4xl font-bold" x-text="menu.find(m => m.id === tab).label"></h2>
                    <p class="text-gray-500 text-sm mt-1">Données calculées en temps réel</p>
                </div>
                <div class="flex gap-4">
                    <div class="neo-card p-4 rounded-2xl flex items-center gap-4 px-6 border border-indigo-500/20">
                        <div class="text-right">
                            <p class="text-[10px] text-gray-500 uppercase tracking-widest font-semibold">Portefeuille Mensuel</p>
                            <p class="text-xl font-bold text-indigo-400" x-text="formatAr(calcWallet('avril'))"></p>
                        </div>
                        <i data-lucide="wallet" class="text-indigo-500"></i>
                    </div>
                </div>
            </div>

            <div x-show="tab === 'jirama'" class="space-y-8 animate-in fade-in duration-500">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 glass p-6 rounded-3xl">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-bold flex items-center gap-2"><i data-lucide="zap" class="text-yellow-500 w-4 h-4"></i> Consommation d'électricité</h3>
                            <div x-show="checkAlert()" class="alert-pulse bg-red-500/20 text-red-500 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border border-red-500/50">
                                Alerte Consommation +2.5kW
                            </div>
                        </div>
                        <div class="grid grid-cols-7 gap-2">
                            <template x-for="day in 31">
                                <div :class="(day >= 25 && day <= 30) ? 'glow-date' : 'bg-black/20'" class="p-2 rounded-xl border border-white/5 text-center">
                                    <span class="text-[9px] text-gray-500 block mb-1" x-text="day"></span>
                                    <input type="number" x-model.number="db.jirama[day]" class="bg-transparent w-full text-center text-xs font-bold focus:outline-none">
                                </div>
                            </template>
                        </div>
                    </div>
                    <div class="neo-card p-8 rounded-3xl flex flex-col justify-center items-center">
                        <p class="text-gray-500 text-sm mb-2">Total Mois (130 Ar/kW)</p>
                        <h4 class="text-4xl font-black text-white" x-text="formatAr(totalJirama())"></h4>
                        <div class="mt-4 text-[10px] text-gray-600 bg-white/5 px-3 py-1 rounded-full">Automatique</div>
                    </div>
                </div>
            </div>

            <div x-show="tab === 'ecolage'" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                <template x-for="m in months">
                    <div class="glass p-6 rounded-3xl text-center">
                        <span class="font-bold capitalize text-sm" x-text="m"></span>
                        <div class="my-4 text-xs text-gray-500">100 000 Ar</div>
                        <button @click="db.ecolage[m] = !db.ecolage[m]" 
                                :class="db.ecolage[m] ? 'bg-indigo-600 shadow-indigo-500/20' : 'bg-white/5 text-gray-500'"
                                class="w-full py-2 rounded-xl text-[10px] font-bold uppercase transition-all shadow-lg">
                            <span x-text="db.ecolage[m] ? 'Payé' : 'À payer'"></span>
                        </button>
                    </div>
                </template>
            </div>

            <div x-show="tab === 'portefeuille'" class="max-w-2xl">
                <div class="glass p-8 lg:p-12 rounded-[2.5rem] relative overflow-hidden border-t border-white/10">
                    <div class="absolute top-0 right-0 p-10 opacity-5">
                        <i data-lucide="wallet" class="w-40 h-40"></i>
                    </div>
                    <label class="text-xs uppercase tracking-[0.2em] text-gray-500">Mon Salaire Mensuel</label>
                    <div class="flex items-center gap-4 mt-2">
                        <input type="number" x-model.number="db.salary" class="bg-transparent text-5xl lg:text-7xl font-black text-white focus:outline-none w-full">
                        <span class="text-2xl font-bold text-gray-700">Ar</span>
                    </div>
                    
                    <div class="mt-12 space-y-4">
                        <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl">
                            <span class="text-sm">Déduction Jirama (Avril)</span>
                            <span class="text-red-400 font-bold" x-text="'- ' + formatAr(totalJirama())"></span>
                        </div>
                        <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl">
                            <span class="text-sm">Écolage (Avril)</span>
                            <span class="text-red-400 font-bold" x-text="db.ecolage['avril'] ? '- 100 000 Ar' : '0 Ar'"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div x-show="tab === 'epargne'" class="flex flex-col items-center justify-center py-12">
                <div class="relative w-72 h-72">
                    <div class="absolute inset-0 border-2 border-dashed border-indigo-500/20 rounded-full animate-[spin_15s_linear_infinite]"></div>
                    <div class="absolute inset-4 glass rounded-full flex flex-col items-center justify-center text-center shadow-2xl">
                        <i data-lucide="piggy-bank" class="w-12 h-12 text-indigo-500 mb-2"></i>
                        <span class="text-gray-500 text-[10px] uppercase tracking-widest">Épargne Cumulative</span>
                        <h3 class="text-4xl font-black text-white px-4" x-text="formatAr(calcTotalSavings())"></h3>
                    </div>
                </div>
                <div class="mt-12 grid grid-cols-2 gap-4 w-full max-w-lg">
                    <div class="glass p-6 rounded-3xl text-center">
                        <p class="text-[10px] text-gray-500 uppercase mb-1">Somme Restes Portefeuille</p>
                        <p class="font-bold text-indigo-400" x-text="formatAr(sumWallet())"></p>
                    </div>
                    <div class="glass p-6 rounded-3xl text-center">
                        <p class="text-[10px] text-gray-500 uppercase mb-1">Total Gains Journaliers</p>
                        <p class="font-bold text-green-400" x-text="formatAr(sumGains())"></p>
                    </div>
                </div>
            </div>

            <div x-show="['shopping','medical','adidy'].includes(tab)" class="max-w-2xl mx-auto space-y-3">
                <template x-for="m in months">
                    <div class="glass p-4 rounded-2xl flex items-center justify-between border-l-4 border-transparent hover:border-indigo-500 transition-all">
                        <span class="capitalize font-medium text-gray-300" x-text="m"></span>
                        <div class="flex items-center gap-3">
                            <input type="number" x-model.number="db[tab][m]" placeholder="0" class="bg-black/40 p-3 rounded-xl text-right w-40 focus:outline-none focus:border-indigo-500 border border-white/5">
                            <span class="text-xs text-gray-600 font-bold">Ar</span>
                        </div>
                    </div>
                </template>
            </div>

            <div x-show="tab === 'objectif'" class="space-y-6">
                <div class="grid grid-cols-4 md:grid-cols-7 lg:grid-cols-10 gap-3">
                    <template x-for="day in 31">
                        <div class="glass p-3 rounded-2xl text-center">
                            <span class="text-[9px] text-gray-500 block mb-1" x-text="'J'+day"></span>
                            <input type="number" x-model.number="db.gains[day]" class="bg-transparent w-full text-center font-black text-green-500 focus:outline-none text-xs">
                        </div>
                    </template>
                </div>
            </div>

        </main>
    </div>

    <script>
        function app() {
            return {
                isLoggedIn: false,
                tab: 'portefeuille',
                loginData: { email: '', pass: '' },
                months: ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'],
                menu: [
                    { id: 'portefeuille', label: 'Portefeuille', icon: 'wallet' },
                    { id: 'jirama', label: 'Jirama', icon: 'zap' },
                    { id: 'ecolage', label: 'Écolage', icon: 'graduation-cap' },
                    { id: 'shopping', label: 'Shopping', icon: 'shopping-cart' },
                    { id: 'medical', label: 'Médical', icon: 'heart-pulse' },
                    { id: 'adidy', label: 'ADIDY', icon: 'gift' },
                    { id: 'epargne', label: 'Épargne', icon: 'landmark' },
                    { id: 'objectif', label: 'Objectifs', icon: 'target' },
                ],
                db: {
                    salary: 0,
                    jirama: {},
                    ecolage: {},
                    shopping: {},
                    medical: {},
                    adidy: {},
                    gains: {}
                },

                init() {
                    const saved = localStorage.getItem('ma_vie_v3');
                    if (saved) this.db = JSON.parse(saved);
                    lucide.createIcons();
                    this.$watch('db', val => {
                        localStorage.setItem('ma_vie_v3', JSON.stringify(val));
                    }, { deep: true });
                },

                handleLogin() {
                    if (this.loginData.email === 'lectratana@gmail.com' && this.loginData.pass === 'andy2050@@') {
                        this.isLoggedIn = true;
                        setTimeout(() => lucide.createIcons(), 50);
                    }
                },

                totalJirama() {
                    let kwh = Object.values(this.db.jirama).reduce((a, b) => a + (Number(b) || 0), 0);
                    return kwh * 130;
                },

                checkAlert() {
                    const days = Object.values(this.db.jirama);
                    for (let i = 1; i < days.length; i++) {
                        if (Math.abs(days[i] - days[i-1]) > 2.5) return true;
                    }
                    return false;
                },

                calcWallet(m) {
                    let cost = 0;
                    if (m === 'avril') cost += this.totalJirama(); // Jirama est géré globalement ici
                    if (this.db.ecolage[m]) cost += 100000;
                    cost += (Number(this.db.shopping[m]) || 0);
                    cost += (Number(this.db.medical[m]) || 0);
                    cost += (Number(this.db.adidy[m]) || 0);
                    return this.db.salary - cost;
                },

                sumWallet() {
                    return this.months.reduce((acc, m) => acc + this.calcWallet(m), 0);
                },

                sumGains() {
                    return Object.values(this.db.gains).reduce((a, b) => a + (Number(b) || 0), 0);
                },

                calcTotalSavings() {
                    return this.sumWallet() + this.sumGains();
                },

                formatAr(v) {
                    return new Intl.NumberFormat('fr-FR').format(v) + ' Ar';
                }
            }
        }
    </script>
</body>
</html>
