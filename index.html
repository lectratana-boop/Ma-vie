<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI.MG - Gestion Personnelle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #e0e7ff 0%, #f3f4f6 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.05); }
        .btn-gradient { background: linear-gradient(90deg, #6366f1, #a855f7); color: white; transition: all 0.3s; }
        .btn-gradient:hover { opacity: 0.9; transform: translateY(-1px); }
        .nav-item:hover { color: #6366f1; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-5xl mx-auto flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-bold text-gray-800">AI.MG</h1>
            <p class="text-gray-500">Votre dashboard personnel</p>
        </div>
        <div class="flex items-center space-x-4">
            <button class="relative p-2 bg-white rounded-full shadow-sm">
                <i class="fa-regular fa-bell text-xl text-gray-600"></i>
                <span class="absolute top-0 right-0 w-3 h-3 bg-red-500 border-2 border-white rounded-full"></span>
            </button>
            <img src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff" class="w-10 h-10 rounded-full border-2 border-white shadow-md">
        </div>
    </header>

    <main class="max-w-5xl mx-auto">
        
        <section id="dashboard" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="glass-card p-6 text-center cursor-pointer hover:scale-105 transition-transform">
                <div class="bg-blue-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-file-invoice-dollar text-2xl text-blue-600"></i>
                </div>
                <span class="font-bold text-gray-700">FACTURATION</span>
            </div>
            <div class="glass-card p-6 text-center cursor-pointer hover:scale-105 transition-transform">
                <div class="bg-purple-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-calendar-days text-2xl text-purple-600"></i>
                </div>
                <span class="font-bold text-gray-700">CALENDRIER</span>
            </div>
            <div class="glass-card p-6 text-center cursor-pointer hover:scale-105 transition-transform">
                <div class="bg-red-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-location-dot text-2xl text-red-600"></i>
                </div>
                <span class="font-bold text-gray-700">LOCALISATION</span>
            </div>
            <div class="glass-card p-6 text-center cursor-pointer hover:scale-105 transition-transform">
                <div class="bg-orange-100 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-rocket text-2xl text-orange-600"></i>
                </div>
                <span class="font-bold text-gray-700">PROJET</span>
            </div>
        </section>

        <div class="grid md:grid-cols-3 gap-8">
            
            <div class="md:col-span-2 space-y-6">
                <div class="glass-card p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold text-gray-800">Dépenses Mensuelles</h3>
                        <button class="btn-gradient px-4 py-2 rounded-xl text-sm font-semibold">+ Ajouter</button>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="flex items-center justify-between p-4 bg-white/50 rounded-2xl">
                            <div class="flex items-center space-x-4">
                                <div class="p-3 bg-yellow-100 rounded-xl text-yellow-600"><i class="fa-solid fa-bolt"></i></div>
                                <div>
                                    <p class="font-bold text-gray-700">JIRAMA</p>
                                    <p class="text-xs text-gray-400">Charges fixes</p>
                                </div>
                            </div>
                            <p class="font-bold text-gray-800">150,000 MGA</p>
                        </div>

                        <div class="flex items-center justify-between p-4 bg-white/50 rounded-2xl">
                            <div class="flex items-center space-x-4">
                                <div class="p-3 bg-blue-100 rounded-xl text-blue-600"><i class="fa-solid fa-car"></i></div>
                                <div>
                                    <p class="font-bold text-gray-700">Carburant</p>
                                    <p class="text-xs text-gray-400">Transport</p>
                                </div>
                            </div>
                            <p class="font-bold text-gray-800">80,000 MGA</p>
                        </div>
                    </div>

                    <div class="mt-8 pt-6 border-t border-gray-100 flex justify-between items-center">
                        <span class="text-gray-500 font-medium">TOTAL MENSUEL AUTOMATIQUE</span>
                        <span class="text-2xl font-black text-indigo-600 uppercase">1,500,000 MGA</span>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="glass-card p-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">Projets en cours</h3>
                    
                    <div class="space-y-4">
                        <div>
                            <div class="flex justify-between text-sm mb-1">
                                <span class="text-gray-600">Terrasse</span>
                                <span class="text-indigo-600 font-bold">60%</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div class="bg-indigo-500 h-2 rounded-full" style="width: 60%"></div>
                            </div>
                        </div>
                        
                        <div class="p-3 bg-green-50 border border-green-100 rounded-xl flex justify-between items-center">
                            <span class="text-sm font-medium text-green-700">Projet Clôture</span>
                            <span class="text-xs bg-green-200 text-green-800 px-2 py-1 rounded-lg">Terminé</span>
                        </div>
                    </div>
                    
                    <button class="w-full mt-6 py-3 border-2 border-dashed border-indigo-200 text-indigo-500 rounded-2xl font-semibold hover:bg-indigo-50 transition-colors">
                        + Nouveau Projet
                    </button>
                </div>
            </div>

        </div>
    </main>

    <nav class="md:hidden fixed bottom-6 left-6 right-6 glass-card px-6 py-4 flex justify-between items-center">
        <i class="fa-solid fa-house text-indigo-600 text-xl"></i>
        <i class="fa-solid fa-calendar-alt text-gray-400 text-xl nav-item"></i>
        <i class="fa-solid fa-plus-circle text-indigo-500 text-3xl"></i>
        <i class="fa-solid fa-search-location text-gray-400 text-xl nav-item"></i>
        <i class="fa-solid fa-user text-gray-400 text-xl nav-item"></i>
    </nav>

</body>
</html>
