<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>AI.MG - Gestion Mensuelle 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at 10% 30%, #1a1a2e, #0f0f1a); min-height: 100vh; padding: 16px; }
        .app-container { max-width: 550px; margin: 0 auto; background: rgba(255,255,255,0.06); backdrop-filter: blur(10px); border-radius: 48px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        .page { display: none; padding: 20px 18px; }
        .active-page { display: block; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); border-radius: 32px; padding: 20px; border: 1px solid rgba(255,255,255,0.2); }
        .gradient-btn { background: linear-gradient(135deg, #a06eff, #6c3eff); border: none; color: white; padding: 12px 20px; border-radius: 60px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .gradient-btn:active { transform: scale(0.96); }
        .gradient-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        input, select, textarea { background: rgba(255,255,255,0.9); border: none; border-radius: 60px; padding: 12px 18px; width: 100%; margin-bottom: 12px; font-size: 0.9rem; }
        textarea { border-radius: 24px; resize: vertical; }
        .grid-2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 20px 0; }
        .dashboard-card { background: linear-gradient(145deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05)); border-radius: 28px; padding: 20px 10px; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.25); transition: all 0.3s; }
        .dashboard-card:active { transform: translateY(3px); }
        .dashboard-card i { font-size: 44px; background: linear-gradient(135deg, #ffd966, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .dashboard-card h3 { color: white; margin-top: 10px; }
        .finance-center { display: flex; gap: 12px; margin: 15px 0; flex-wrap: wrap; }
        .finance-card { flex: 1; background: rgba(0,0,0,0.4); border-radius: 28px; padding: 14px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        .finance-amount { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #f9f3c1, #ffe6a3); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .month-selector { background: rgba(255,255,255,0.15); border-radius: 60px; padding: 6px 12px; display: inline-flex; gap: 12px; margin-bottom: 16px; }
        .header-app { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-weight: 800; font-size: 1.7rem; background: linear-gradient(135deg, #f0e6ff, #c7b9ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: white; padding: 12px 24px; border-radius: 40px; z-index: 1000; font-size: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .aiza-container { padding: 20px; border-radius: 30px; background: linear-gradient(145deg, #1a1a2e, #0f0f1a); }
        .search-3d { display: flex; gap: 10px; background: rgba(255,255,255,0.08); padding: 10px; border-radius: 40px; margin-bottom: 20px; }
        .search-3d input { flex: 1; background: none; border: none; color: white; padding: 8px; outline: none; margin: 0; }
        .search-3d input::placeholder { color: rgba(255,255,255,0.5); }
        .search-3d button { background: linear-gradient(135deg, #8c52ff, #6c3eff); border: none; padding: 8px 20px; border-radius: 30px; color: white; cursor: pointer; font-weight: 600; }
        .dropdown-3d { position: relative; margin-bottom: 12px; }
        .dropdown-input { width: 100%; padding: 12px; border-radius: 25px; background: rgba(255,255,255,0.9); font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .dropdown-input span { color: #666; }
        .dropdown-menu { position: absolute; top: 100%; left: 0; right: 0; background: rgba(20,20,40,0.98); border-radius: 20px; margin-top: 8px; z-index: 100; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.3s ease; max-height: 250px; overflow-y: auto; border: 1px solid rgba(108,62,255,0.3); }
        .dropdown-menu.show { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-item { padding: 12px 16px; color: white; cursor: pointer; transition: all 0.2s; }
        .dropdown-item:hover { background: #6c3eff; }
        .photo-upload { display: flex; justify-content: space-between; align-items: center; color: white; margin: 10px 0; }
        .plus-btn { background: #8c52ff; border: none; border-radius: 50%; width: 40px; height: 40px; color: white; font-size: 24px; cursor: pointer; transition: all 0.3s; }
        .plus-btn:active { transform: scale(0.9); }
        .photo-preview { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .preview-thumb { width: 70px; height: 70px; border-radius: 15px; object-fit: cover; border: 2px solid #6c3eff; }
        .list-title { color: white; font-size: 18px; font-weight: 700; margin: 20px 0 10px 0; padding: 10px 15px; background: linear-gradient(135deg, rgba(140,82,255,0.3), rgba(108,62,255,0.2)); border-left: 4px solid #8c52ff; border-radius: 10px; display: block; }
        .product-card { display: flex; gap: 12px; background: rgba(255,255,255,0.1); padding: 12px; border-radius: 20px; margin: 10px 0; color: white; cursor: pointer; transition: all 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .product-card:hover { background: rgba(108,62,255,0.3); transform: translateX(5px); box-shadow: 0 4px 15px rgba(140,82,255,0.4); }
        .product-card img { width: 70px; height: 70px; border-radius: 15px; object-fit: cover; border: 2px solid #6c3eff; flex-shrink: 0; }
        .product-card-info { flex: 1; }
        .product-card strong { font-size: 16px; display: block; margin-bottom: 5px; color: #fff; }
        .product-card small { color: #aaa; font-size: 12px; display: block; margin-top: 3px; }
        .save-btn { width: 100%; padding: 14px; border: none; border-radius: 35px; background: linear-gradient(135deg, #8c52ff, #6c3eff); color: white; font-weight: bold; font-size: 16px; margin-top: 20px; cursor: pointer; transition: all 0.3s; }
        .save-btn:active { transform: scale(0.98); }
        .save-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .back-btn-bottom { text-align: center; margin-top: 20px; }
        .back-btn-bottom button { background: rgba(255,255,255,0.2); border: none; padding: 10px 20px; border-radius: 40px; color: white; cursor: pointer; transition: all 0.3s; }
        .back-btn-bottom button:hover { background: rgba(255,255,255,0.3); }
        
        /* MODAL AMÉLIORÉ */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; animation: fadeIn 0.3s ease; }
        .modal.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-content { max-width: 95%; max-height: 95vh; background: #1a1a2e; border-radius: 32px; padding: 25px; text-align: center; border: 2px solid #6c3eff; overflow-y: auto; position: relative; animation: scaleIn 0.3s ease; }
        @keyframes scaleIn { from { transform: scale(0.8); } to { transform: scale(1); } }
        .modal-image { max-width: 100%; max-height: 70vh; border-radius: 24px; margin-bottom: 15px; object-fit: contain; box-shadow: 0 8px 30px rgba(140,82,255,0.5); cursor: pointer; transition: all 0.3s; }
        .modal-image:hover { transform: scale(1.02); }
        .modal-desc { color: white; margin-top: 15px; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 20px; text-align: left; line-height: 1.8; }
        .modal-desc strong { font-size: 22px; color: #c7b9ff; display: block; margin-bottom: 15px; }
        .modal-info-line { margin: 8px 0; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .close-modal { position: absolute; top: 15px; right: 25px; color: white; font-size: 35px; cursor: pointer; background: rgba(217,83,79,0.8); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.3s; z-index: 10; }
        .close-modal:hover { background: #d9534f; transform: rotate(90deg); }
        
        .expense-item { display: flex; justify-content: space-between; background: rgba(255,255,245,0.9); padding: 10px 16px; border-radius: 40px; margin-bottom: 8px; }
        .cat-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; }
        .cat-btn { background: rgba(255,255,255,0.2); border-radius: 60px; padding: 8px 16px; font-size: 13px; cursor: pointer; color: white; transition: all 0.3s; border: 1px solid transparent; }
        .cat-btn:hover { background: rgba(255,255,255,0.3); }
        .cat-active { background: linear-gradient(135deg, #a06eff, #6c3eff); color: white; border: 1px solid #8c52ff; }
        
        .empty-state { text-align: center; padding: 40px 20px; color: #aaa; }
        .empty-state i { font-size: 60px; margin-bottom: 15px; opacity: 0.3; }
        
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s linear infinite; margin-left: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 500px) { 
            .page { padding: 14px; } 
            .modal-content { max-width: 95%; padding: 20px; }
            .list-title { font-size: 16px; }
            .product-card img { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- PAGE LOGIN -->
    <div id="loginPage" class="page active-page">
        <div class="card" style="margin-top: 40px;">
            <div class="logo" style="text-align: center;">AI.MG</div>
            <h2 style="text-align: center; margin: 20px 0; color:white;">Connexion</h2>
            <input type="email" id="email" placeholder="Email *" autocomplete="email">
            <input type="password" id="password" placeholder="Mot de passe *" autocomplete="current-password">
            <button id="signinBtn" class="gradient-btn" style="width: 100%; margin-bottom: 12px;">Se connecter</button>
            <button id="showRegisterBtn" class="gradient-btn" style="width: 100%; background:linear-gradient(135deg,#3a86ff,#2666cc);">Créer un compte</button>
            <div id="authMessage" style="margin-top: 12px; text-align: center; color:#ffb4a2; font-size: 13px;"></div>
        </div>
    </div>

    <!-- PAGE INSCRIPTION -->
    <div id="registerPage" class="page">
        <div class="card" style="margin-top: 40px;">
            <div class="logo" style="text-align: center;">AI.MG</div>
            <h2 style="text-align: center; margin: 20px 0; color:white;">Inscription</h2>
            <input type="email" id="regEmail" placeholder="Email *" autocomplete="email">
            <input type="password" id="regPassword" placeholder="Mot de passe * (min 6)" autocomplete="new-password">
            <input type="tel" id="regPhone" placeholder="Téléphone (+261...)">
            <button id="registerBtn" class="gradient-btn" style="width: 100%; margin-bottom: 12px;">S'inscrire</button>
            <button id="showLoginBtn" class="gradient-btn" style="width: 100%; background:linear-gradient(135deg,#3a86ff,#2666cc);">Retour</button>
            <div id="registerMessage" style="margin-top: 12px; text-align: center; color:#ffb4a2; font-size: 13px;"></div>
        </div>
    </div>

    <!-- PAGE DASHBOARD -->
    <div id="dashboardPage" class="page">
        <div class="header-app">
            <span class="logo">AI.MG</span>
            <button id="logoutBtn" class="gradient-btn" style="padding: 6px 16px; background:#d9534f;">Déco</button>
        </div>
        <div class="month-selector" style="justify-content: center;">
            <i class="fas fa-calendar-alt" style="color:white;"></i>
            <select id="monthSelector" style="width: auto; background: rgba(0,0,0,0.6); color:white; margin:0;">
                <option value="0">Janvier</option><option value="1">Février</option><option value="2">Mars</option><option value="3">Avril</option>
                <option value="4">Mai</option><option value="5">Juin</option><option value="6">Juillet</option><option value="7">Août</option>
                <option value="8">Septembre</option><option value="9">Octobre</option><option value="10">Novembre</option><option value="11">Décembre</option>
            </select>
        </div>
        <div class="finance-center">
            <div class="finance-card">
                <i class="fas fa-wallet" style="font-size: 30px; color: #ffd966;"></i>
                <h3 style="color:#eee;">Salaire</h3>
                <div class="finance-amount" id="salaryDisplay">0 Ar</div>
                <input type="number" id="monthlySalaryInput" placeholder="Montant" style="margin:8px 0;">
                <button id="saveSalaryBtn" class="gradient-btn" style="padding:6px; width: 100%;">💾 Enregistrer</button>
            </div>
            <div class="finance-card">
                <i class="fas fa-piggy-bank" style="font-size: 30px; color: #ffd966;"></i>
                <h3 style="color:#eee;">Épargne</h3>
                <div class="finance-amount" id="savingDisplay">0 Ar</div>
                <div style="font-size:11px; color:#ccc; margin-top: 8px;" id="savingDetail"></div>
            </div>
        </div>
        <div class="grid-2x2">
            <div class="dashboard-card" data-nav="facturation">
                <i class="fas fa-file-invoice-dollar"></i>
                <h3>Factures</h3>
            </div>
            <div class="dashboard-card" data-nav="calendrier">
                <i class="fas fa-calendar-alt"></i>
                <h3>Calendrier</h3>
            </div>
            <div class="dashboard-card" data-nav="aiza">
                <i class="fas fa-map-marker-alt"></i>
                <h3>AIZA</h3>
            </div>
            <div class="dashboard-card" data-nav="projet">
                <i class="fas fa-tasks"></i>
                <h3>Projets</h3>
            </div>
        </div>
    </div>

    <!-- PAGE FACTURATION -->
    <div id="facturationPage" class="page">
        <div class="header-app">
            <button class="gradient-btn" data-back="dashboard"><i class="fas fa-arrow-left"></i> Retour</button>
            <span class="logo">Factures</span>
            <div></div>
        </div>
        <div class="card">
            <div class="month-selector" style="justify-content: space-between;">
                <span style="color:white;">Mois</span>
                <select id="factMonthSelect" style="width: auto; background: rgba(0,0,0,0.6); color:white;"></select>
            </div>
            <div class="cat-grid" id="catContainer"></div>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="expenseName" placeholder="Nom dépense" style="flex:2">
                <input type="number" id="expenseAmount" placeholder="Montant" style="flex:1">
                <button id="addExpenseBtn" class="gradient-btn" style="padding: 12px 20px;">+</button>
            </div>
            <div id="expenseList" style="margin-top: 16px;"></div>
            <div style="margin-top: 16px; text-align:center; font-weight:bold; color:white; font-size: 18px;" id="totalMonthly"></div>
        </div>
    </div>

    <!-- PAGE CALENDRIER -->
    <div id="calendrierPage" class="page">
        <div class="header-app">
            <button class="gradient-btn" data-back="dashboard"><i class="fas fa-arrow-left"></i> Retour</button>
            <span class="logo">Agenda</span>
            <div></div>
        </div>
        <div class="card" id="calendarContainer" style="padding: 8px;"></div>
        <div class="card" style="margin-top: 16px;">
            <input type="text" id="eventTitle" placeholder="Titre">
            <input type="datetime-local" id="eventDate">
            <textarea id="eventDesc" rows="3" placeholder="Description"></textarea>
            <button id="addEventBtn" class="gradient-btn" style="width: 100%;">Ajouter</button>
        </div>
        <div id="eventListPreview" style="margin-top: 12px;"></div>
    </div>

    <!-- PAGE AIZA -->
    <div id="aizaPage" class="page">
        <div class="aiza-container">
            <div style="text-align: center; margin-bottom: 20px;">
                <h2 style="color: white; font-size: 24px;">📦 Gestion des Objets</h2>
                <p style="color: #aaa; font-size: 13px;">Organisez et retrouvez vos objets facilement</p>
            </div>
            
            <div class="search-3d">
                <input type="text" id="searchInput" placeholder="🔍 Rechercher un objet...">
                <button id="searchBtn">Rechercher</button>
            </div>
            
            <div class="form-3d">
                <div class="dropdown-3d" id="categoryDropdown">
                    <div class="dropdown-input">
                        <span id="selectedCategoryText">📁 Catégorie</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="dropdown-menu" id="categoryMenu"></div>
                </div>
                
                <div class="dropdown-3d" id="subcategoryDropdown">
                    <div class="dropdown-input">
                        <span id="selectedSubcategoryText">📂 Sous-catégorie</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="dropdown-menu" id="subcategoryMenu"></div>
                </div>
                
                <input type="text" id="objName" placeholder="📝 Nom de l'objet">
                <input type="text" id="objLocation" placeholder="📍 Localisation (ex: Chambre, Bureau...)">
                <textarea id="objDescription" rows="3" maxlength="250" placeholder="✍️ Description (optionnelle)"></textarea>
                
                <div class="photo-upload">
                    <span>📸 Photos (max 5)</span>
                    <button type="button" class="plus-btn" id="addPhotoBtn">+</button>
                </div>
                <input type="file" id="objPhotos" accept="image/*" multiple style="display: none;">
                <div id="photoPreview" class="photo-preview"></div>
                
                <button id="saveObjectBtn" class="save-btn">💾 Enregistrer l'objet</button>
                
                <div id="productsListContainer" style="margin-top: 30px;"></div>
            </div>
            
            <div class="back-btn-bottom">
                <button data-back="dashboard">← Retour au tableau de bord</button>
            </div>
        </div>
    </div>

    <!-- MODAL PRODUIT -->
    <div id="productModal" class="modal">
        <span class="close-modal">&times;</span>
        <div class="modal-content">
            <img id="modalImage" class="modal-image" src="" alt="Image produit">
            <div id="modalDescription" class="modal-desc"></div>
        </div>
    </div>

    <!-- PAGE PROJETS -->
    <div id="projetPage" class="page">
        <div class="header-app">
            <button class="gradient-btn" data-back="dashboard"><i class="fas fa-arrow-left"></i> Retour</button>
            <span class="logo">Projets</span>
            <div></div>
        </div>
        <div class="card">
            <input type="text" id="projectName" placeholder="Nom du projet">
            <select id="projectMonth">
                <option value="0">Janvier</option><option value="1">Février</option><option value="2">Mars</option><option value="3">Avril</option>
                <option value="4">Mai</option><option value="5">Juin</option><option value="6">Juillet</option><option value="7">Août</option>
                <option value="8">Septembre</option><option value="9">Octobre</option><option value="10">Novembre</option><option value="11">Décembre</option>
            </select>
            <select id="projectStatus">
                <option value="en cours">En cours</option>
                <option value="terminé">Terminé</option>
            </select>
            <button id="addProjectBtn" class="gradient-btn" style="width: 100%;">Ajouter</button>
            <div id="projectsList" style="margin-top: 20px;"></div>
        </div>
    </div>
</div>

<script>
    // ==================== CONFIGURATION FIREBASE (CORRIGÉE) ====================
    const firebaseConfig = {
        apiKey: "AIzaSyBqcigoEE0rRNkzfYvIRUtH2Vu-BBaCbVg",  // ⚠️ CLÉ INCOMPLÈTE - REMPLACEZ PAR LA VRAIE
        authDomain: "aimg-app.firebaseapp.com",
        projectId: "aimg-app",
        storageBucket: "aimg-app.firebasestorage.app",
        messagingSenderId: "139623135058",
        appId: "1:139623135058:web:407a3a1aabaa5a6780ec8b"
    };
    
    // Vérification et initialisation Firebase
    try {
        firebase.initializeApp(firebaseConfig);
        console.log("✅ Firebase initialisé avec succès");
    } catch(e) {
        console.error("❌ Erreur initialisation Firebase:", e);
        alert("Erreur de configuration Firebase. Vérifiez votre clé API.");
    }
    
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();
    
    // VARIABLES GLOBALES
    let currentUser = null;
    let currentMonth = new Date().getMonth();
    let currentSearchTerm = "";
    let selectedCategory = "";
    let selectedSubcategory = "";
    let calendar = null;
    
    // CATÉGORIES ET SOUS-CATÉGORIES
    const categoriesList = ["Vêtements", "Jouets", "Bureautique", "Informatique", "Électronique", "Maison", "Sports", "Autre"];
    const subcategoriesMap = {
        "Vêtements": ["T-shirts", "Pantalons", "Robes", "Vestes", "Chaussures", "Chaussettes", "Accessoires"],
        "Jouets": ["Voitures", "Poupées", "Lego", "Peluches", "Ballons", "Jeux de société"],
        "Bureautique": ["Papier", "Stylos", "Classeurs", "Enveloppes", "Agrafeuse", "Post-it"],
        "Informatique": ["Clé USB", "Ordinateur", "Souris", "Clavier", "Disque dur", "Câbles"],
        "Électronique": ["Téléphone", "Tablette", "Écouteurs", "Chargeur", "Batterie", "Caméra"],
        "Maison": ["Meubles", "Décoration", "Ustensiles", "Linge", "Électroménager"],
        "Sports": ["Ballon", "Raquette", "Vélo", "Chaussures", "Vêtements", "Équipement"],
        "Autre": ["Divers", "Non classé"]
    };
    
    // FONCTION TOAST
    function showToast(msg, isErr = false) {
        document.querySelectorAll('.toast').forEach(t => t.remove());
        
        let t = document.createElement('div');
        t.className = 'toast';
        t.style.background = isErr ? '#d9534f' : 'rgba(0,0,0,0.9)';
        t.textContent = msg;

    // ESCAPE HTML
    function escapeHtml(str) { 
        if(!str) return ''; 
        return String(str).replace(/[&<>"']/g, m => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        })[m]); 
    }

    async function loadFacturation() {
        if(!currentUser) return;
        renderFactCats();
        
        try {
            let doc = await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).get();
            let expenses = doc.exists ? (doc.data().expenses || {}) : {};
            let list = expenses[activeFactCat] || [];
            
            document.getElementById('expenseList').innerHTML = list.map((e, i) => 
                `<div class="expense-item">
                    <span><strong>${escapeHtml(e.name)}</strong>: ${e.amount.toLocaleString()} Ar</span>
                    <div>
                        <button class="editExpense" data-idx="${i}" style="background:none; border:none; cursor:pointer; font-size:18px;">✏️</button>
                        <button class="delExpense" data-idx="${i}" style="background:none; border:none; cursor:pointer; font-size:18px;">🗑️</button>
                    </div>
                </div>`
            ).join('');
            
            let total = 0;
            for(let cat in expenses) {
                (expenses[cat] || []).forEach(e => total += e.amount);
            }
            document.getElementById('totalMonthly').innerHTML = `💰 Total mensuel: ${total.toLocaleString()} Ar`;
            
            document.querySelectorAll('.editExpense').forEach(btn => {
                btn.onclick = async () => {
                    let idx = parseInt(btn.dataset.idx);
                    let newName = prompt("Nouveau nom:", list[idx].name);
                    let newAmount = prompt("Nouveau montant:", list[idx].amount);
                    
                    if(newName && newAmount) {
                        list[idx] = { name: newName, amount: parseFloat(newAmount) };
                        expenses[activeFactCat] = list;
                        await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).set({ expenses }, { merge: true });
                        loadFacturation();
                        loadDashboard();
                        showToast("✅ Dépense modifiée");
                    }
                };
            });
            
            document.querySelectorAll('.delExpense').forEach(btn => {
                btn.onclick = async () => {
                    if(confirm("Supprimer cette dépense ?")) {
                        list.splice(parseInt(btn.dataset.idx), 1);
                        expenses[activeFactCat] = list;
                        await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).set({ expenses }, { merge: true });
                        loadFacturation();
                        loadDashboard();
                        showToast("🗑️ Dépense supprimée");
                    }
                };
            });
        } catch(e) {
            console.error("Erreur loadFacturation:", e);
            showToast("Erreur de chargement", true);
        }
    }

    async function uploadPhotos(files) {
        if(!files || files.length === 0) return [];
        
        let urls = [];
        
        try {
            for(let i = 0; i < Math.min(files.length, 5); i++) {
                let file = files[i];
                let timestamp = Date.now();
                let fileName = `${timestamp}_${i}_${file.name}`;
                let ref = storage.ref().child(`users/${currentUser.uid}/objects/${fileName}`);
                
                console.log("Upload photo:", fileName);
                await ref.put(file);
                let url = await ref.getDownloadURL();
                urls.push(url);
                console.log("Photo uploadée:", url);
            }
        } catch(e) {
            console.error("Erreur upload photos:", e);
            showToast("Erreur upload photos: " + e.message, true);
        }
        
        return urls;
    }
    
    async function loadProducts() {
        if(!currentUser) {
            console.log("Pas d'utilisateur connecté");
            return;
        }
        
        try {
            console.log("Chargement des produits pour:", currentUser.uid, "mois:", getMonthKey());
            
            let docRef = db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey());
            let doc = await docRef.get();
            
            let objects = [];
            if(doc.exists) {
                objects = doc.data().objects || [];
                console.log("Objets trouvés:", objects.length, objects);
            } else {
                console.log("Aucun document trouvé");
            }
            
            let filtered = objects;
            if(currentSearchTerm) {
                let s = currentSearchTerm.toLowerCase();
                filtered = objects.filter(o => 
                    (o.name || '').toLowerCase().includes(s) || 
                    (o.category || '').toLowerCase().includes(s) || 
                    (o.subCategory || '').toLowerCase().includes(s) || 
                    (o.location || '').toLowerCase().includes(s)
                );
                console.log("Objets filtrés:", filtered.length);
            }
            
            let grouped = {};
            filtered.forEach(o => { 
                let cat = o.category || "Autre"; 
                if(!grouped[cat]) grouped[cat] = []; 
                grouped[cat].push(o); 
            });
            
            console.log("Groupes:", grouped);
            
            let html = '';
            
            if(Object.keys(grouped).length === 0) {
                html = `<div class="empty-state">
                    <i class="fas fa-box-open"></i>
                    <p>Aucun objet trouvé</p>
                    <small style="display:block; margin-top:10px;">Ajoutez votre premier objet ci-dessus</small>
                </div>`;
            } else {
                for(let [cat, items] of Object.entries(grouped)) {
                    html += `<div class="list-title">📁 ${escapeHtml(cat)} (${items.length})</div>`;
                    
                    items.forEach((o, idx) => {
                        let thumb = (o.photos && o.photos.length > 0 && o.photos[0]) ? o.photos[0] : 'https://via.placeholder.com/70/6c3eff/ffffff?text=📦';
                        
                        html += `<div class="product-card" data-index="${idx}">
                            <img src="${thumb}" alt="${escapeHtml(o.name)}" onerror="this.src='https://via.placeholder.com/70/6c3eff/ffffff?text=📦'">
                            <div class="product-card-info">
                                <strong>${escapeHtml(o.name)}</strong>
                                <small>📂 ${escapeHtml(o.subCategory || 'Non classé')}</small>
                                <small>📍 ${escapeHtml(o.location)}</small>
                            </div>
                        </div>`;
                    });
                }
            }
            
            let container = document.getElementById('productsListContainer');
            container.innerHTML = html;
            
            document.querySelectorAll('.product-card').forEach((card, globalIdx) => {
                card.addEventListener('click', function() {
                    let foundObject = null;
                    let count = 0;
                    
                    for(let [cat, items] of Object.entries(grouped)) {
                        for(let obj of items) {
                            if(count === globalIdx) {
                                foundObject = obj;
                                break;
                            }
                            count++;
                        }
                        if(foundObject) break;
                    }
                    
                    if(!foundObject) {
                        console.error("Objet non trouvé");
                        return;
                    }
                    
                    let modal = document.getElementById('productModal');
                    let imgSrc = (foundObject.photos && foundObject.photos.length > 0 && foundObject.photos[0]) 
                        ? foundObject.photos[0] 
                        : 'https://via.placeholder.com/400/6c3eff/ffffff?text=Aucune+image';
                    
                    document.getElementById('modalImage').src = imgSrc;
                    document.getElementById('modalImage').onerror = function() {
                        this.src = 'https://via.placeholder.com/400/d9534f/ffffff?text=Erreur';
                    };
                    
                    document.getElementById('modalDescription').innerHTML = `
                        <strong>${escapeHtml(foundObject.name)}</strong>
                        <div style="margin-top: 15px; font-size: 14px;">
                            <div class="modal-info-line">
                                <strong>📁 Catégorie:</strong> ${escapeHtml(foundObject.category || 'Non défini')}
                            </div>
                            <div class="modal-info-line">
                                <strong>📂 Sous-catégorie:</strong> ${escapeHtml(foundObject.subCategory || 'Non défini')}
                            </div>
                            <div class="modal-info-line">
                                <strong>📍 Localisation:</strong> ${escapeHtml(foundObject.location)}
                            </div>
                            <div class="modal-info-line" style="border:none;">
                                <strong>📝 Description:</strong><br>
                                <span style="color:#ccc;">${escapeHtml(foundObject.description || 'Aucune description')}</span>
                            </div>
                        </div>
                    `;
                    
                    modal.classList.add('active');
                });
            });
            
            console.log("Produits affichés avec succès");
            
        } catch(e) {
            console.error("Erreur loadProducts:", e);
            showToast("Erreur de chargement des objets", true);
        }
    }

            selectedCategory = "";
            selectedSubcategory = "";
            document.getElementById('selectedCategoryText').innerHTML = '📁 Catégorie';
            document.getElementById('selectedCategoryText').style.color = '#666';
            document.getElementById('selectedSubcategoryText').innerHTML = '📂 Sous-catégorie';
            document.getElementById('selectedSubcategoryText').style.color = '#666';
            
            this.disabled = false;
            this.innerHTML = '💾 Enregistrer l'objet';
            
            await loadProducts();
            
            showToast("✅ Objet sauvegardé avec succès !");
            
            console.log("=== FIN ENREGISTREMENT ===");
            
        } catch(e) {
            console.error("ERREUR COMPLÈTE:", e);
            showToast("❌ Erreur: " + e.message, true);
            
            this.disabled = false;
            this.innerHTML = '💾 Enregistrer l'objet';
        }
    });
    
    // ==================== PROJETS ====================
    async function loadProjects() {
        try {
            let doc = await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).get();
            let projects = doc.exists ? (doc.data().projects || []) : [];
            
            let groups = Array(12).fill().map(()=>[]);
            projects.forEach(p => groups[p.month].push(p));
            
            let html = '';
            for(let m=0; m<12; m++) {
                let monthName = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"][m];
                html += `<div style="margin-bottom: 20px;">
                    <h4 style="color:white; margin-bottom: 10px;">${monthName} (${groups[m].length}/10)</h4>`;
                
                groups[m].forEach(p => {
                    html += `<div class="expense-item">
                        <span><strong>${escapeHtml(p.name)}</strong> - ${p.status}</span>
                        <div>
                            <button class="toggleProj" data-id="${p.id}" style="background:none; border:none; cursor:pointer; font-size:18px;">🔄</button>
                            <button class="delProj" data-id="${p.id}" style="background:none; border:none; cursor:pointer; font-size:18px;">🗑️</button>
                        </div>
                    </div>`;
                });
                
                html += `</div>`;
            }
            
            document.getElementById('projectsList').innerHTML = html;
        } catch(e) {
            console.error("Erreur loadProjects:", e);
        }
    }
    
    document.getElementById('addProjectBtn').addEventListener('click', async () => {
        let name = document.getElementById('projectName').value.trim();
        let month = parseInt(document.getElementById('projectMonth').value);
        let status = document.getElementById('projectStatus').value;
        
        if(!name) return showToast("Nom requis", true);
        
        try {
            let doc = await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).get();
            let projects = doc.exists ? (doc.data().projects || []) : [];
            
            if(projects.filter(p => p.month === month).length >= 10) {
                return showToast("Maximum 10 projets par mois", true);
            }
            
            projects.push({ id: Date.now(), name, month, status });
            await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).set({ projects }, { merge: true });
            
            document.getElementById('projectName').value = '';
            loadProjects();
            showToast("✅ Projet ajouté");
        } catch(e) {
            console.error("Erreur addProject:", e);
            showToast("Erreur d'ajout", true);
        }
    });
    
    // Modal
    document.querySelector('.close-modal').onclick = () => {
        document.getElementById('productModal').classList.remove('active');
    };
    
    window.onclick = (e) => { 
        let m = document.getElementById('productModal'); 
        if(e.target === m) m.classList.remove('active'); 
    };
    
    document.onclick = (e) => { 
        if(!e.target.closest('.dropdown-3d')) { 
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show')); 
            document.querySelectorAll('.dropdown-input i').forEach(i => i.style.transform = 'rotate(0deg)'); 
        } 
    };
    
    document.getElementById('monthSelector').onchange = (e) => { 
        currentMonth = parseInt(e.target.value); 
        loadDashboard(); 
        
        let fs = document.getElementById('factMonthSelect');
        if(fs) fs.value = currentMonth;
        
        if(document.getElementById('facturationPage').classList.contains('active-page')) {
            loadFacturation();
        }
    };
    
    setInterval(() => { 
        let fs = document.getElementById('factMonthSelect'); 
        if(fs && fs.innerHTML === '') { 
            fs.innerHTML = [...Array(12)].map((_,i)=>
                `<option value="${i}" ${currentMonth==i?'selected':''}>
                    ${["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"][i]}
                </option>`
            ).join(''); 
            
            fs.onchange = (e) => { 
                currentMonth = parseInt(e.target.value); 
                document.getElementById('monthSelector').value = currentMonth; 
                loadDashboard(); 
                loadFacturation(); 
            }; 
        } 
    }, 500);
    
    console.log("✅ Script chargé avec succès");
</script>
</body>
</html>
