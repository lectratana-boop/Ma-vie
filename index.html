<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI.MG - Gestion Personnelle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at 10% 30%, #1a1a2e, #0f0f1a); min-height: 100vh; padding: 16px; }
        .app-container { max-width: 550px; margin: 0 auto; background: rgba(255,255,255,0.06); backdrop-filter: blur(10px); border-radius: 48px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        .page { display: none; padding: 20px 18px; }
        .active-page { display: block; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); border-radius: 32px; padding: 30px 24px; border: 1px solid rgba(255,255,255,0.2); }
        .gradient-btn { background: linear-gradient(135deg, #a06eff, #6c3eff); border: none; color: white; padding: 14px 20px; border-radius: 60px; font-weight: 600; cursor: pointer; font-size: 16px; width: 100%; margin-bottom: 12px; }
        .gradient-btn-secondary { background: linear-gradient(135deg, #3a86ff, #2666cc); }
        .gradient-btn-danger { background: #d9534f; }
        input { background: rgba(255,255,255,0.9); border: none; border-radius: 60px; padding: 14px 18px; width: 100%; margin-bottom: 14px; font-size: 16px; }
        .logo { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #f0e6ff, #c7b9ff); -webkit-background-clip: text; background-clip: text; color: transparent; text-align: center; margin-bottom: 20px; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: white; padding: 12px 24px; border-radius: 40px; z-index: 1000; animation: fadeOut 3s ease forwards; font-size: 14px; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .link-btn { background: none; border: none; color: #c7b9ff; cursor: pointer; margin-top: 10px; font-size: 14px; text-align: center; width: 100%; }
        h2 { color: white; text-align: center; margin-bottom: 25px; font-size: 24px; }
        p { color: #ccc; text-align: center; margin: 15px 0; }
    </style>
</head>
<body>
<div class="app-container">
    <div id="loginPage" class="page active-page">
        <div class="card">
            <div class="logo">AI.MG</div>
            <h2>Connexion</h2>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Mot de passe">
            <button id="signinBtn" class="gradient-btn">Se connecter</button>
            <button id="showRegisterBtn" class="gradient-btn gradient-btn-secondary">Créer un compte</button>
            <button id="forgotPwdBtn" class="link-btn">Mot de passe oublié ?</button>
            <div id="loginMessage" style="margin-top: 15px; text-align: center; color: #ffb4a2; font-size: 14px;"></div>
        </div>
    </div>

    <div id="registerPage" class="page">
        <div class="card">
            <div class="logo">AI.MG</div>
            <h2>Inscription</h2>
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPassword" placeholder="Mot de passe (min 6)">
            <input type="tel" id="regPhone" placeholder="Téléphone (+261...)">
            <button id="registerBtn" class="gradient-btn">S'inscrire</button>
            <button id="showLoginBtn" class="gradient-btn gradient-btn-secondary">Retour</button>
            <div id="registerMessage" style="margin-top: 15px; text-align: center; color: #ffb4a2; font-size: 14px;"></div>
        </div>
    </div>

    <div id="verifyPage" class="page">
        <div class="card" style="text-align: center;">
            <i class="fas fa-envelope" style="font-size: 60px; color: #ffd966; margin-bottom: 20px;"></i>
            <h2>Vérifiez votre email</h2>
            <p>Un email a été envoyé à <strong id="verifyEmailSpan"></strong></p>
            <button id="resendVerifyBtn" class="gradient-btn">Renvoyer l'email</button>
            <button id="logoutFromVerifyBtn" class="gradient-btn gradient-btn-danger">Retour</button>
        </div>
    </div>

    <div id="dashboardPage" class="page">
        <div class="card">
            <div class="logo">AI.MG</div>
            <h2>✅ Connecté !</h2>
            <p>Bienvenue <strong id="userEmailDisplay"></strong></p>
            <button id="logoutBtn" class="gradient-btn gradient-btn-danger">Déconnexion</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBgjkrFJjhgt3zFJg90j1NymbG6s2AQRC0",
        authDomain: "aimg-app.firebaseapp.com",
        projectId: "aimg-app",
        storageBucket: "aimg-app.firebasestorage.app",
        messagingSenderId: "139623135058",
        appId: "1:139623135058:web:407a3a1aabaa5a6780ec8b"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    
    function showToast(msg, isErr) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.style.background = isErr ? '#d9534f' : 'rgba(0,0,0,0.9)';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }
    
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
    }
    
    async function register() {
        const email = document.getElementById('regEmail').value.trim();
        const pwd = document.getElementById('regPassword').value;
        const phone = document.getElementById('regPhone').value.trim();
        const msg = document.getElementById('registerMessage');
        if (!email || !pwd) { msg.innerHTML = "❌ Email et mot de passe requis"; return; }
        if (pwd.length < 6) { msg.innerHTML = "❌ 6 caractères minimum"; return; }
        msg.innerHTML = "⏳...";
        try {
            const userCred = await auth.createUserWithEmailAndPassword(email, pwd);
            await userCred.user.sendEmailVerification();
            await db.collection('users').doc(userCred.user.uid).set({ email, phone, createdAt: new Date() });
            msg.innerHTML = "✅ Compte créé ! Vérifiez votre email";
            showToast("Email de vérification envoyé");
            await auth.signOut();
            document.getElementById('verifyEmailSpan').textContent = email;
            showPage('verifyPage');
        } catch(e) {
            let m = e.message;
            if (m.includes('email-already-in-use')) m = "Email déjà utilisé";
            msg.innerHTML = "❌ " + m;
            showToast(m, true);
        }
    }
    
    async function login() {
        const email = document.getElementById('loginEmail').value.trim();
        const pwd = document.getElementById('loginPassword').value;
        const msg = document.getElementById('loginMessage');
        if (!email || !pwd) { msg.innerHTML = "❌ Email et mot de passe requis"; return; }
        msg.innerHTML = "⏳...";
        try {
            const userCred = await auth.signInWithEmailAndPassword(email, pwd);
            await userCred.user.reload();
            if (!userCred.user.emailVerified) {
                await auth.signOut();
                document.getElementById('verifyEmailSpan').textContent = email;
                showPage('verifyPage');
                msg.innerHTML = "❌ Vérifiez votre email";
                return;
            }
            document.getElementById('userEmailDisplay').textContent = userCred.user.email;
            showToast("Connecté !");
            showPage('dashboardPage');
        } catch(e) {
            let m = e.message;
            if (m.includes('user-not-found')) m = "Compte inexistant";
            if (m.includes('wrong-password')) m = "Mot de passe incorrect";
            msg.innerHTML = "❌ " + m;
            showToast(m, true);
        }
    }
    
    async function resetPassword() {
        const email = prompt("Email pour réinitialisation :");
        if (email && email.includes('@')) {
            try { await auth.sendPasswordResetEmail(email); showToast("Email envoyé !"); } catch(e) { showToast("Email non trouvé", true); }
        }
    }
    
    async function resendVerification() {
        const user = auth.currentUser;
        if (user) { await user.sendEmailVerification(); showToast("Email renvoyé !"); }
        else showToast("Aucun utilisateur", true);
    }
    
    async function logout() { await auth.signOut(); showToast("Déconnecté"); showPage('loginPage'); }
    
    auth.onAuthStateChanged(async (user) => {
        if (user && user.emailVerified) showPage('dashboardPage');
        else if (user && !user.emailVerified) { document.getElementById('verifyEmailSpan').textContent = user.email; showPage('verifyPage'); }
        else showPage('loginPage');
    });
    
    document.getElementById('signinBtn').onclick = login;
    document.getElementById('showRegisterBtn').onclick = () => showPage('registerPage');
    document.getElementById('showLoginBtn').onclick = () => showPage('loginPage');
    document.getElementById('registerBtn').onclick = register;
    document.getElementById('forgotPwdBtn').onclick = resetPassword;
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('resendVerifyBtn').onclick = resendVerification;
    document.getElementById('logoutFromVerifyBtn').onclick = () => { auth.signOut(); showPage('loginPage'); };
</script>
</body>
</html>
