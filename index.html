<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>AI.MG - Gestion Mensuelle 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at 10% 30%, #1a1a2e, #0f0f1a); min-height: 100vh; padding: 16px; }
        .app-container { max-width: 550px; margin: 0 auto; background: rgba(255,255,255,0.06); backdrop-filter: blur(10px); border-radius: 48px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); }
        .page { display: none; padding: 20px 18px; }
        .active-page { display: block; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); border-radius: 32px; padding: 20px; border: 1px solid rgba(255,255,255,0.2); }
        .gradient-btn { background: linear-gradient(135deg, #a06eff, #6c3eff); border: none; color: white; padding: 12px 20px; border-radius: 60px; font-weight: 600; cursor: pointer; }
        .gradient-btn:active { transform: scale(0.96); }
        input, select, textarea { background: rgba(255,255,255,0.9); border: none; border-radius: 60px; padding: 12px 18px; width: 100%; margin-bottom: 12px; font-size: 0.9rem; }
        textarea { border-radius: 24px; resize: vertical; }
        .grid-2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 20px 0; }
        .dashboard-card { background: linear-gradient(145deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05)); border-radius: 28px; padding: 20px 10px; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.25); }
        .dashboard-card:active { transform: translateY(3px); }
        .dashboard-card i { font-size: 44px; background: linear-gradient(135deg, #ffd966, #ffb347); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .finance-center { display: flex; gap: 12px; margin: 15px 0; flex-wrap: wrap; }
        .finance-card { flex: 1; background: rgba(0,0,0,0.4); border-radius: 28px; padding: 14px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        .finance-amount { font-size: 1.6rem; font-weight: 800; background: linear-gradient(135deg, #f9f3c1, #ffe6a3); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .month-selector { background: rgba(255,255,255,0.15); border-radius: 60px; padding: 6px 12px; display: inline-flex; gap: 12px; margin-bottom: 16px; }
        .header-app { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-weight: 800; font-size: 1.7rem; background: linear-gradient(135deg, #f0e6ff, #c7b9ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: white; padding: 10px 20px; border-radius: 40px; z-index: 1000; animation: fadeOut 3s ease forwards; font-size: 14px; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        
        .aiza-container { padding: 20px; border-radius: 30px; background: linear-gradient(145deg, #1a1a2e, #0f0f1a); }
        .search-3d { display: flex; gap: 10px; background: rgba(255,255,255,0.08); padding: 10px; border-radius: 40px; margin-bottom: 20px; }
        .search-3d input { flex: 1; background: none; border: none; color: white; padding: 8px; outline: none; }
        .search-3d button { background: linear-gradient(135deg, #8c52ff, #6c3eff); border: none; padding: 8px 20px; border-radius: 30px; color: white; cursor: pointer; }
        .dropdown-3d { position: relative; margin-bottom: 12px; }
        .dropdown-input { width: 100%; padding: 12px; border-radius: 25px; background: rgba(255,255,255,0.9); font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .dropdown-input span { color: #666; }
        .dropdown-menu { position: absolute; top: 100%; left: 0; right: 0; background: rgba(20,20,40,0.98); border-radius: 20px; margin-top: 8px; z-index: 100; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.3s ease; max-height: 250px; overflow-y: auto; border: 1px solid rgba(108,62,255,0.3); }
        .dropdown-menu.show { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-item { padding: 12px 16px; color: white; cursor: pointer; transition: all 0.2s; }
        .dropdown-item:hover { background: #6c3eff; }
        .photo-upload { display: flex; justify-content: space-between; align-items: center; color: white; margin: 10px 0; }
        .plus-btn { background: #8c52ff; border: none; border-radius: 50%; width: 40px; height: 40px; color: white; font-size: 24px; cursor: pointer; }
        .photo-preview { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .preview-thumb { width: 60px; height: 60px; border-radius: 15px; object-fit: cover; border: 2px solid #6c3eff; }
        .list-title { color: white; font-size: 16px; font-weight: 600; margin: 20px 0 10px 0; padding-bottom: 5px; border-bottom: 2px solid #6c3eff; display: inline-block; }
        .product-card { display: flex; gap: 12px; background: rgba(255,255,255,0.1); padding: 12px; border-radius: 20px; margin: 10px 0; color: white; cursor: pointer; transition: all 0.2s; }
        .product-card:hover { background: rgba(108,62,255,0.3); transform: translateX(5px); }
        .product-card img { width: 55px; height: 55px; border-radius: 15px; object-fit: cover; }
        .product-card div { flex: 1; }
        .save-btn { width: 100%; padding: 14px; border: none; border-radius: 35px; background: linear-gradient(135deg, #8c52ff, #6c3eff); color: white; font-weight: bold; font-size: 16px; margin-top: 20px; cursor: pointer; }
        .back-btn-bottom { text-align: center; margin-top: 20px; }
        .back-btn-bottom button { background: rgba(255,255,255,0.2); border: none; padding: 10px 20px; border-radius: 40px; color: white; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { max-width: 90%; background: #1a1a2e; border-radius: 32px; padding: 20px; text-align: center; border: 1px solid #6c3eff; }
        .modal-image { max-width: 100%; max-height: 60vh; border-radius: 24px; }
        .modal-desc { color: white; margin-top: 15px; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 20px; }
        .close-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
        .expense-item { display: flex; justify-content: space-between; background: rgba(255,255,245,0.9); padding: 10px 16px; border-radius: 40px; margin-bottom: 8px; }
        .cat-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; }
        .cat-btn { background: rgba(255,255,255,0.2); border-radius: 60px; padding: 6px 16px; font-size: 12px; cursor: pointer; }
        .cat-active { background: linear-gradient(135deg, #a06eff, #6c3eff); color: white; }
        @media (max-width: 500px) { .page { padding: 14px; } }
    </style>
</head>
<body>
<div class="app-container">
    <div id="loginPage" class="page active-page">
        <div class="card" style="margin-top: 40px;">
            <div class="logo" style="text-align: center;">AI.MG</div>
            <h2 style="text-align: center; margin: 20px 0; color:white;">Connexion</h2>
            <input type="email" id="email" placeholder="Email *">
            <input type="password" id="password" placeholder="Mot de passe *">
            <button id="signinBtn" class="gradient-btn" style="margin-bottom: 12px;">Se connecter</button>
            <button id="showRegisterBtn" class="gradient-btn" style="background:linear-gradient(135deg,#3a86ff,#2666cc);">Créer un compte</button>
            <div id="authMessage" style="margin-top: 12px; text-align: center; color:#ffb4a2;"></div>
        </div>
    </div>

    <div id="registerPage" class="page">
        <div class="card" style="margin-top: 40px;">
            <div class="logo" style="text-align: center;">AI.MG</div>
            <h2 style="text-align: center; margin: 20px 0; color:white;">Inscription</h2>
            <input type="email" id="regEmail" placeholder="Email *">
            <input type="password" id="regPassword" placeholder="Mot de passe * (min 6)">
            <input type="tel" id="regPhone" placeholder="Téléphone (+261...)">
            <button id="registerBtn" class="gradient-btn" style="margin-bottom: 12px;">S'inscrire</button>
            <button id="showLoginBtn" class="gradient-btn" style="background:linear-gradient(135deg,#3a86ff,#2666cc);">Retour</button>
            <div id="registerMessage" style="margin-top: 12px; text-align: center; color:#ffb4a2;"></div>
        </div>
    </div>

    <div id="dashboardPage" class="page">
        <div class="header-app"><span class="logo">AI.MG</span><button id="logoutBtn" class="gradient-btn" style="padding: 6px 16px; background:#d9534f;">Déco</button></div>
        <div class="month-selector" style="justify-content: center;">
            <i class="fas fa-calendar-alt" style="color:white;"></i>
            <select id="monthSelector" style="width: auto; background: rgba(0,0,0,0.6); color:white; margin:0;">
                <option value="0">Janvier</option><option value="1">Février</option><option value="2">Mars</option><option value="3">Avril</option>
                <option value="4">Mai</option><option value="5">Juin</option><option value="6">Juillet</option><option value="7">Août</option>
                <option value="8">Septembre</option><option value="9">Octobre</option><option value="10">Novembre</option><option value="11">Décembre</option>
            </select>
        </div>
        <div class="finance-center">
            <div class="finance-card"><i class="fas fa-wallet"></i><h3 style="color:#eee;">Salaire</h3><div class="finance-amount" id="salaryDisplay">0 Ar</div><input type="number" id="monthlySalaryInput" placeholder="Montant" style="margin:8px 0;"><button id="saveSalaryBtn" class="gradient-btn" style="padding:6px;">💾</button></div>
            <div class="finance-card"><i class="fas fa-piggy-bank"></i><h3 style="color:#eee;">Épargne</h3><div class="finance-amount" id="savingDisplay">0 Ar</div><div style="font-size:11px;" id="savingDetail"></div></div>
        </div>
        <div class="grid-2x2">
            <div class="dashboard-card" data-nav="facturation"><i class="fas fa-file-invoice-dollar"></i><h3>Factures</h3></div>
            <div class="dashboard-card" data-nav="calendrier"><i class="fas fa-calendar-alt"></i><h3>Calendrier</h3></div>
            <div class="dashboard-card" data-nav="aiza"><i class="fas fa-map-marker-alt"></i><h3>AIZA</h3></div>
            <div class="dashboard-card" data-nav="projet"><i class="fas fa-tasks"></i><h3>Projets</h3></div>
        </div>
    </div>

    <div id="facturationPage" class="page">
        <div class="header-app"><button class="gradient-btn" data-back="dashboard"><i class="fas fa-arrow-left"></i> Retour</button><span class="logo">Factures</span><div></div></div>
        <div class="card">
            <div class="month-selector" style="justify-content: space-between;"><span>Mois</span><select id="factMonthSelect"></select></div>
            <div class="cat-grid" id="catContainer"></div>
            <div style="display: flex; gap: 8px;"><input type="text" id="expenseName" placeholder="Nom dépense" style="flex:2"><input type="number" id="expenseAmount" placeholder="Montant" style="flex:1"><button id="addExpenseBtn" class="gradient-btn">+</button></div>
            <div id="expenseList" style="margin-top: 16px;"></div>
            <div style="margin-top: 16px; text-align:center; font-weight:bold;" id="totalMonthly"></div>
        </div>
    </div>

    <div id="calendrierPage" class="page">
        <div class="header-app"><button class="gradient-btn" data-back="dashboard"><i class="fas fa-arrow-left"></i> Retour</button><span class="logo">Agenda</span><div></div></div>
        <div class="card" id="calendarContainer" style="padding: 8px;"></div>
        <div class="card" style="margin-top: 16px;">
            <input type="text" id="eventTitle" placeholder="Titre">
            <input type="datetime-local" id="eventDate">
            <textarea id="eventDesc" rows="3" placeholder="Description"></textarea>
            <button id="addEventBtn" class="gradient-btn">Ajouter</button>
        </div>
        <div id="eventListPreview" style="margin-top: 12px;"></div>
    </div>

    <div id="aizaPage" class="page">
        <div class="aiza-container">
            <div class="search-3d">
                <input type="text" id="searchInput" placeholder="Rechercher un objet...">
                <button id="searchBtn">Rechercher</button>
            </div>
            <div class="form-3d">
                <div class="dropdown-3d" id="categoryDropdown">
                    <div class="dropdown-input"><span id="selectedCategoryText">Catégorie</span><i class="fas fa-chevron-down"></i></div>
                    <div class="dropdown-menu" id="categoryMenu"></div>
                </div>
                <div class="dropdown-3d" id="subcategoryDropdown">
                    <div class="dropdown-input"><span id="selectedSubcategoryText">Sous-catégorie</span><i class="fas fa-chevron-down"></i></div>
                    <div class="dropdown-menu" id="subcategoryMenu"></div>
                </div>
                <input type="text" id="objName" placeholder="Nom de l'objet">
                <input type="text" id="objLocation" placeholder="Localisation">
                <textarea id="objDescription" rows="3" maxlength="250" placeholder="Description"></textarea>
                <div class="photo-upload"><span>📸 Photos (max 5)</span><button type="button" class="plus-btn" id="addPhotoBtn">+</button></div>
                <input type="file" id="objPhotos" accept="image/*" multiple style="display: none;">
                <div id="photoPreview" class="photo-preview"></div>
                <div id="productsListContainer"></div>
                <button id="saveObjectBtn" class="save-btn">💾 Enregistrer l'objet</button>
            </div>
            <div class="back-btn-bottom"><button data-back="dashboard">← Retour</button></div>
        </div>
    </div>

    <div id="productModal" class="modal"><span class="close-modal">&times;</span><div class="modal-content"><img id="modalImage" class="modal-image" src=""><div id="modalDescription" class="modal-desc"></div></div></div>

    <div id="projetPage" class="page">
        <div class="header-app"><button class="gradient-btn" data-back="dashboard"><i class="fas fa-arrow-left"></i> Retour</button><span class="logo">Projets</span><div></div></div>
        <div class="card">
            <input type="text" id="projectName" placeholder="Nom du projet">
            <select id="projectMonth"><option value="0">Janvier</option><option value="1">Février</option><option value="2">Mars</option><option value="3">Avril</option>
            <option value="4">Mai</option><option value="5">Juin</option><option value="6">Juillet</option><option value="7">Août</option>
            <option value="8">Septembre</option><option value="9">Octobre</option><option value="10">Novembre</option><option value="11">Décembre</option></select>
            <select id="projectStatus"><option value="en cours">En cours</option><option value="terminé">Terminé</option></select>
            <button id="addProjectBtn" class="gradient-btn">Ajouter</button>
            <div id="projectsList" style="margin-top: 20px;"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBqcigoEE0rRNkzfYvIRUtH2Vu-BBaCbVg",
        authDomain: "aimg-app.firebaseapp.com",
        projectId: "aimg-app",
        storageBucket: "aimg-app.firebasestorage.app",
        messagingSenderId: "139623135058",
        appId: "1:139623135058:web:407a3a1aabaa5a6780ec8b"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();
    
    let currentUser = null;
    let currentMonth = new Date().getMonth();
    let currentSearchTerm = "";
    let selectedCategory = "";
    let selectedSubcategory = "";
    let calendar = null;
    
    const categoriesList = ["Vêtements", "Jouets", "Bureautique", "Informatique", "Électronique", "Maison", "Sports", "Autre"];
    const subcategoriesMap = {
        "Vêtements": ["T-shirts", "Pantalons", "Robes", "Vestes", "Chaussures", "Chaussettes"],
        "Jouets": ["Voitures", "Poupées", "Lego", "Peluches", "Ballons", "Jeux"],
        "Bureautique": ["Papier", "Stylos", "Classeurs", "Enveloppes", "Agrafeuse", "Post-it"],
        "Informatique": ["Clé USB", "Ordinateur", "Souris", "Clavier", "Disque dur", "Câbles"],
        "Électronique": ["Téléphone", "Tablette", "Écouteurs", "Chargeur", "Batterie"],
        "Maison": ["Meubles", "Décoration", "Ustensiles", "Linge", "Électroménager"],
        "Sports": ["Ballon", "Raquette", "Vélo", "Chaussures", "Vêtements"],
        "Autre": ["Divers", "Non classé"]
    };
    
    function showToast(msg, isErr) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.style.background = isErr ? '#d9534f' : 'rgba(0,0,0,0.9)';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }
    
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(id === 'dashboardPage') loadDashboard();
        if(id === 'aizaPage') { initAiza(); loadProducts(); }
        if(id === 'facturationPage') loadFacturation();
        if(id === 'calendrierPage') initCalendar();
        if(id === 'projetPage') loadProjects();
    }
    
    function getMonthKey() { return `2025_${currentMonth}`; }
    
    async function loadDashboard() {
        if(!currentUser) return;
        let doc = await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).get();
        let salary = doc.exists ? (doc.data().salary || 0) : 0;
        let expenses = doc.exists ? (doc.data().expenses || {}) : {};
        let total = 0;
        for(let cat in expenses) (expenses[cat] || []).forEach(e => total += e.amount || 0);
        document.getElementById('salaryDisplay').innerHTML = salary.toLocaleString() + ' Ar';
        document.getElementById('savingDisplay').innerHTML = (salary - total).toLocaleString() + ' Ar';
        document.getElementById('savingDetail').innerHTML = `Salaire: ${salary.toLocaleString()} Ar | Dépenses: ${total.toLocaleString()} Ar`;
        document.getElementById('monthlySalaryInput').value = salary;
    }
    
    document.getElementById('saveSalaryBtn')?.addEventListener('click', async () => {
        let salary = parseFloat(document.getElementById('monthlySalaryInput').value) || 0;
        await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).set({ salary }, { merge: true });
        showToast("Salaire enregistré");
        loadDashboard();
    });
    
    // FACTURATION
    const factCats = ["Charges fixes", "Éducation", "Alimentation", "Transport", "Santé", "Shopping", "Imprévus"];
    let activeFactCat = "Charges fixes";
    
    function renderFactCats() {
        let container = document.getElementById('catContainer');
        container.innerHTML = factCats.map(cat => `<div class="cat-btn ${activeFactCat===cat?'cat-active':''}" data-cat="${cat}">${cat}</div>`).join('');
        document.querySelectorAll('.cat-btn').forEach(btn => btn.onclick = () => { activeFactCat = btn.dataset.cat; renderFactCats(); loadFacturation(); });
    }
    
    async function loadFacturation() {
        if(!currentUser) return;
        renderFactCats();
        let doc = await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).get();
        let expenses = doc.exists ? (doc.data().expenses || {}) : {};
        let list = expenses[activeFactCat] || [];
        document.getElementById('expenseList').innerHTML = list.map((e, i) => `<div class="expense-item"><span>${e.name}: ${e.amount} Ar</span><div><button class="editExpense" data-idx="${i}">✏️</button><button class="delExpense" data-idx="${i}">🗑️</button></div></div>`).join('');
        let total = 0;
        for(let cat in expenses) (expenses[cat] || []).forEach(e => total += e.amount);
        document.getElementById('totalMonthly').innerHTML = `💰 Total: ${total.toLocaleString()} Ar`;
        
        document.querySelectorAll('.editExpense').forEach(btn => btn.onclick = async () => {
            let idx = btn.dataset.idx;
            let newName = prompt("Nouveau nom", list[idx].name);
            let newAmount = prompt("Montant", list[idx].amount);
            if(newName && newAmount) {
                list[idx] = { name: newName, amount: parseFloat(newAmount) };
                expenses[activeFactCat] = list;
                await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).set({ expenses }, { merge: true });
                loadFacturation();
                loadDashboard();
            }
        });
        document.querySelectorAll('.delExpense').forEach(btn => btn.onclick = async () => {
            list.splice(btn.dataset.idx, 1);
            expenses[activeFactCat] = list;
            await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).set({ expenses }, { merge: true });
            loadFacturation();
            loadDashboard();
        });
    }
    
    document.getElementById('addExpenseBtn')?.addEventListener('click', async () => {
        let name = document.getElementById('expenseName').value.trim();
        let amount = parseFloat(document.getElementById('expenseAmount').value);
        if(!name || isNaN(amount)) return showToast("Nom et montant valides", true);
        let doc = await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).get();
        let expenses = doc.exists ? (doc.data().expenses || {}) : {};
        if(!expenses[activeFactCat]) expenses[activeFactCat] = [];
        expenses[activeFactCat].push({ name, amount });
        await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).set({ expenses }, { merge: true });
        document.getElementById('expenseName').value = '';
        document.getElementById('expenseAmount').value = '';
        loadFacturation();
        loadDashboard();
        showToast("Dépense ajoutée");
    });
    
    // CALENDRIER
    async function initCalendar() {
        let doc = await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).get();
        let events = doc.exists ? (doc.data().events || []) : [];
        let calEl = document.getElementById('calendarContainer');
        if(calendar) calendar.destroy();
        calendar = new FullCalendar.Calendar(calEl, {
            initialView: 'dayGridMonth',
            events: events.map(e => ({ title: e.title, start: e.date })),
            height: 'auto'
        });
        calendar.render();
        document.getElementById('addEventBtn').onclick = async () => {
            let title = document.getElementById('eventTitle').value.trim();
            let date = document.getElementById('eventDate').value;
            if(!title || !date) return showToast("Titre et date requis", true);
            events.push({ title, date });
            await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).set({ events }, { merge: true });
            initCalendar();
            showToast("Événement ajouté");
        };
    }
    
    // AIZA
    function initDropdowns() {
        let catMenu = document.getElementById('categoryMenu');
        catMenu.innerHTML = categoriesList.map(c => `<div class="dropdown-item" data-value="${c}">${c}</div>`).join('');
        catMenu.querySelectorAll('.dropdown-item').forEach(item => {
            item.onclick = () => {
                selectedCategory = item.dataset.value;
                document.getElementById('selectedCategoryText').innerHTML = selectedCategory;
                document.getElementById('selectedCategoryText').style.color = 'white';
                document.getElementById('categoryMenu').classList.remove('show');
                let subMenu = document.getElementById('subcategoryMenu');
                let subs = subcategoriesMap[selectedCategory] || ["Autre"];
                subMenu.innerHTML = subs.map(s => `<div class="dropdown-item" data-value="${s}">${s}</div>`).join('');
                subMenu.querySelectorAll('.dropdown-item').forEach(sub => {
                    sub.onclick = () => {
                        selectedSubcategory = sub.dataset.value;
                        document.getElementById('selectedSubcategoryText').innerHTML = selectedSubcategory;
                        document.getElementById('selectedSubcategoryText').style.color = 'white';
                        document.getElementById('subcategoryMenu').classList.remove('show');
                    };
                });
            };
        });
    }
    
    function setupDropdown(dropdownId) {
        let dd = document.getElementById(dropdownId);
        let input = dd.querySelector('.dropdown-input');
        let menu = dd.querySelector('.dropdown-menu');
        let icon = input.querySelector('i');
        input.onclick = (e) => {
            e.stopPropagation();
            let isOpen = menu.classList.contains('show');
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
            document.querySelectorAll('.dropdown-input i').forEach(i => i.style.transform = 'rotate(0deg)');
            if (!isOpen) {
                menu.classList.add('show');
                icon.style.transform = 'rotate(180deg)';
            }
        };
    }
    
    document.getElementById('addPhotoBtn')?.addEventListener('click', () => document.getElementById('objPhotos').click());
    
    document.getElementById('objPhotos')?.addEventListener('change', function(e) {
        let preview = document.getElementById('photoPreview');
        preview.innerHTML = '';
        let files = Array.from(e.target.files);
        for(let i = 0; i < Math.min(files.length, 5); i++) {
            let reader = new FileReader();
            reader.onload = (ev) => {
                let img = document.createElement('img');
                img.src = ev.target.result;
                img.className = 'preview-thumb';
                preview.appendChild(img);
            };
            reader.readAsDataURL(files[i]);
        }
    });
    
    async function uploadPhotos(files) {
        if(!files || files.length === 0) return [];
        let urls = [];
        for(let i = 0; i < Math.min(files.length, 5); i++) {
            let file = files[i];
            let ref = storage.ref().child(`users/${currentUser.uid}/objects/${Date.now()}_${i}_${file.name}`);
            await ref.put(file);
            urls.push(await ref.getDownloadURL());
        }
        return urls;
    }
    
    async function loadProducts() {
        if(!currentUser) return;
        let doc = await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).get();
        let objects = doc.exists ? (doc.data().objects || []) : [];
        let filtered = objects;
        if(currentSearchTerm) {
            let s = currentSearchTerm.toLowerCase();
            filtered = objects.filter(o => (o.name || '').toLowerCase().includes(s) || (o.category || '').toLowerCase().includes(s) || (o.subCategory || '').toLowerCase().includes(s) || (o.location || '').toLowerCase().includes(s));
        }
        let grouped = {};
        filtered.forEach(o => { let sub = o.subCategory || "Autre"; if(!grouped[sub]) grouped[sub] = []; grouped[sub].push(o); });
        let html = '';
        if(Object.keys(grouped).length === 0) html = '<div style="color:#aaa; text-align:center; padding:20px;">Aucun objet</div>';
        else for(let [sub, items] of Object.entries(grouped)) {
            html += `<div class="list-title">📁 ${escapeHtml(sub)}</div>`;
            items.forEach(o => {
                let thumb = (o.photos && o.photos[0]) || 'https://via.placeholder.com/55';
                html += `<div class="product-card" data-name="${escapeHtml(o.name)}" data-cat="${escapeHtml(o.category || '')}" data-sub="${escapeHtml(o.subCategory || '')}" data-loc="${escapeHtml(o.location)}" data-desc="${escapeHtml(o.description || '')}" data-photos='${JSON.stringify(o.photos || [])}'><img src="${thumb}"><div><strong>${escapeHtml(o.name)}</strong><small>📍 ${escapeHtml(o.location)}</small></div></div>`;
            });
        }
        document.getElementById('productsListContainer').innerHTML = html;
        document.querySelectorAll('.product-card').forEach(card => {
            card.onclick = () => {
                let modal = document.getElementById('productModal');
                let photos = JSON.parse(card.dataset.photos);
                document.getElementById('modalImage').src = (photos && photos[0]) || 'https://via.placeholder.com/300';
                document.getElementById('modalDescription').innerHTML = `<strong>${card.dataset.name}</strong><br>📁 ${card.dataset.cat} / ${card.dataset.sub}<br>📍 ${card.dataset.loc}<br><br>📝 ${card.dataset.desc}`;
                modal.classList.add('active');
            };
        });
    }
    
    document.getElementById('searchBtn')?.addEventListener('click', async () => {
        currentSearchTerm = document.getElementById('searchInput').value;
        await loadProducts();
        showToast(`Recherche: "${currentSearchTerm || 'tous'}"`);
    });
    
    document.getElementById('saveObjectBtn')?.addEventListener('click', async () => {
        let name = document.getElementById('objName').value.trim();
        let location = document.getElementById('objLocation').value.trim();
        let description = document.getElementById('objDescription').value.trim();
        let photos = document.getElementById('objPhotos').files;
        if(!name) { showToast("Nom requis", true); return; }
        if(!location) { showToast("Localisation requise", true); return; }
        if(!selectedCategory) { showToast("Catégorie requise", true); return; }
        let photoUrls = await uploadPhotos(photos);
        let docRef = db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey());
        let doc = await docRef.get();
        let objects = doc.exists ? (doc.data().objects || []) : [];
        objects.push({ id: Date.now(), name, category: selectedCategory, subCategory: selectedSubcategory || "Sous-catégorie", location, description, photos: photoUrls });
        await docRef.set({ objects }, { merge: true });
        document.getElementById('objName').value = '';
        document.getElementById('objLocation').value = '';
        document.getElementById('objDescription').value = '';
        document.getElementById('objPhotos').value = '';
        document.getElementById('photoPreview').innerHTML = '';
        selectedCategory = "";
        selectedSubcategory = "";
        document.getElementById('selectedCategoryText').innerHTML = 'Catégorie';
        document.getElementById('selectedCategoryText').style.color = '#666';
        document.getElementById('selectedSubcategoryText').innerHTML = 'Sous-catégorie';
        document.getElementById('selectedSubcategoryText').style.color = '#666';
        await loadProducts();
        showToast("Objet sauvegardé !");
    });
    
    async function initAiza() {
        if(!currentUser) return;
        initDropdowns();
        setupDropdown('categoryDropdown');
        setupDropdown('subcategoryDropdown');
        await loadProducts();
    }
    
    // PROJETS
    async function loadProjects() {
        let doc = await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).get();
        let projects = doc.exists ? (doc.data().projects || []) : [];
        let groups = Array(12).fill().map(()=>[]);
        projects.forEach(p => groups[p.month].push(p));
        let html = '';
        for(let m=0;m<12;m++) {
            let monthName = ["Jan","Fév","Mar","Avr","Mai","Juin","Juil","Aoû","Sep","Oct","Nov","Déc"][m];
            html += `<div><h4 style="color:white;">${monthName} (${groups[m].length}/10)</h4>`;
            groups[m].forEach(p => html += `<div class="expense-item"><span>${p.name} - ${p.status}</span><div><button class="toggleProj" data-id="${p.id}">🔄</button><button class="delProj" data-id="${p.id}">🗑️</button></div></div>`);
            html += `</div>`;
        }
        document.getElementById('projectsList').innerHTML = html;
    }
    
    document.getElementById('addProjectBtn')?.addEventListener('click', async () => {
        let name = document.getElementById('projectName').value.trim();
        let month = parseInt(document.getElementById('projectMonth').value);
        let status = document.getElementById('projectStatus').value;
        if(!name) return showToast("Nom requis", true);
        let doc = await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).get();
        let projects = doc.exists ? (doc.data().projects || []) : [];
        if(projects.filter(p => p.month === month).length >= 10) return showToast("Max 10 projets", true);
        projects.push({ id: Date.now(), name, month, status });
        await db.collection('users').doc(currentUser.uid).collection('months').doc(getMonthKey()).set({ projects }, { merge: true });
        document.getElementById('projectName').value = '';
        loadProjects();
        showToast("Projet ajouté");
    });
    
    // AUTH
    async function register() {
        let email = document.getElementById('regEmail').value.trim();
        let pwd = document.getElementById('regPassword').value;
        if(!email || !pwd || pwd.length < 6) return showToast("Email et mot de passe (min 6)", true);
        try {
            await auth.createUserWithEmailAndPassword(email, pwd);
            showToast("Compte créé ! Connectez-vous");
            showPage('loginPage');
        } catch(e) { showToast(e.message, true); }
    }
    
    async function login() {
        let email = document.getElementById('email').value.trim();
        let pwd = document.getElementById('password').value;
        if(!email || !pwd) return showToast("Email et mot de passe requis", true);
        try {
            await auth.signInWithEmailAndPassword(email, pwd);
            showToast("Connecté !");
            showPage('dashboardPage');
        } catch(e) { showToast(e.message, true); }
    }
    
    async function logout() { await auth.signOut(); currentUser = null; showPage('loginPage'); }
    
    auth.onAuthStateChanged(async (user) => {
        if(user) { currentUser = user; await loadDashboard(); showPage('dashboardPage'); }
        else showPage('loginPage');
    });
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    
    document.getElementById('signinBtn').onclick = login;
    document.getElementById('showRegisterBtn').onclick = () => showPage('registerPage');
    document.getElementById('showLoginBtn').onclick = () => showPage('loginPage');
    document.getElementById('registerBtn').onclick = register;
    document.getElementById('logoutBtn').onclick = logout;
    document.querySelectorAll('[data-back]').forEach(btn => btn.onclick = () => showPage('dashboardPage'));
    document.querySelectorAll('.dashboard-card').forEach(card => card.onclick = () => showPage(card.dataset.nav + 'Page'));
    document.querySelector('.close-modal').onclick = () => document.getElementById('productModal').classList.remove('active');
    window.onclick = (e) => { let m = document.getElementById('productModal'); if(e.target === m) m.classList.remove('active'); };
    document.onclick = (e) => { if(!e.target.closest('.dropdown-3d')) { document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show')); document.querySelectorAll('.dropdown-input i').forEach(i => i.style.transform = 'rotate(0deg)'); } };
    
    document.getElementById('monthSelector').onchange = (e) => { currentMonth = parseInt(e.target.value); loadDashboard(); if(document.getElementById('factMonthSelect')) document.getElementById('factMonthSelect').value = currentMonth; loadFacturation(); };
    setInterval(() => { let fs = document.getElementById('factMonthSelect'); if(fs) { fs.innerHTML = [...Array(12)].map((_,i)=>`<option value="${i}" ${currentMonth==i?'selected':''}>${["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"][i]}</option>`).join(''); fs.onchange = (e) => { currentMonth = parseInt(e.target.value); document.getElementById('monthSelector').value = currentMonth; loadDashboard(); loadFacturation(); }; } }, 500);
</script>
